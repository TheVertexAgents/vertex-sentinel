<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel Live Monitor | Verifiable Execution</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --cyan: #00E5FF;
            --purple: #7C3AED;
            --obsidian: #0B0E14;
        }
        body {
            background-color: var(--obsidian);
            color: #E2E8F0;
            font-family: 'Inter', sans-serif;
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
        }
        .text-cyan { color: var(--cyan); }
        .bg-cyan { background-color: var(--cyan); }
        .border-cyan { border-color: var(--cyan); }
        .text-purple { color: var(--purple); }
        .glow-cyan { text-shadow: 0 0 10px rgba(0, 229, 255, 0.5); }

        @keyframes pulse-cyan {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .animate-pulse-cyan {
            animation: pulse-cyan 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-bold text-cyan glow-cyan tracking-tight flex items-center gap-3">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path>
                    </svg>
                    SENTINEL MONITOR
                </h1>
                <p class="text-gray-400 mt-1">Verifiable On-Chain Execution Loop</p>
            </div>
            <div class="flex gap-4">
                <div class="flex items-center gap-2 glass px-4 py-2 text-xs font-medium uppercase tracking-wider">
                    <span class="w-2 h-2 rounded-full bg-cyan animate-pulse-cyan"></span>
                    Fail-Closed Active
                </div>
                <button id="sync-btn" class="glass px-6 py-2 hover:bg-white/5 transition-colors font-semibold flex items-center gap-2 border-cyan/50">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    SYNC
                </button>
            </div>
        </header>

        <!-- Stats -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="glass p-6">
                <p class="text-gray-400 text-sm mb-1 uppercase tracking-widest">Total Checkpoints</p>
                <p id="stat-total" class="text-4xl font-bold">0</p>
            </div>
            <div class="glass p-6">
                <p class="text-gray-400 text-sm mb-1 uppercase tracking-widest">Signed Attestations</p>
                <p id="stat-signed" class="text-4xl font-bold text-cyan">0</p>
            </div>
            <div class="glass p-6">
                <p class="text-gray-400 text-sm mb-1 uppercase tracking-widest">Status</p>
                <p class="text-4xl font-bold flex items-center gap-2">
                    <span class="text-green-400">Online</span>
                </p>
            </div>
        </div>

        <!-- Log Table -->
        <div class="glass overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="border-b border-white/10 text-gray-400 text-xs uppercase tracking-widest">
                            <th class="px-6 py-4">Timestamp</th>
                            <th class="px-6 py-4">Action</th>
                            <th class="px-6 py-4">Pair</th>
                            <th class="px-6 py-4">Amount</th>
                            <th class="px-6 py-4">Confidence</th>
                            <th class="px-6 py-4">EIP-712 Sign</th>
                            <th class="px-6 py-4">Explanation</th>
                        </tr>
                    </thead>
                    <tbody id="log-body">
                        <!-- Rows injected here -->
                    </tbody>
                </table>
            </div>
        </div>

        <footer class="mt-12 text-center text-gray-500 text-sm">
            Sentinel Layer v1.0.0 | Verifiable Execution Protocol
        </footer>
    </div>

    <script>
        async function fetchLogs() {
            try {
                // In local development with 'serve', this works if audit.json is accessible
                // We fetch the audit.json from the logs directory
                const response = await fetch('../logs/audit.json');
                const text = await response.text();
                const lines = text.trim().split('\n').filter(l => l.length > 0);

                const logBody = document.getElementById('log-body');
                logBody.innerHTML = '';

                let signedCount = 0;

                lines.reverse().forEach(line => {
                    const entry = JSON.parse(line);
                    const msg = entry.message;

                    const date = new Date(parseInt(msg.timestamp) * 1000).toLocaleString();
                    const amount = (parseFloat(msg.amountUsdScaled) / 100).toLocaleString('en-US', { style: 'currency', currency: 'USD' });
                    const confidence = (parseInt(msg.confidenceScaled) / 10).toFixed(1) + '%';

                    const row = document.createElement('tr');
                    row.className = "border-b border-white/5 hover:bg-white/5 transition-colors";

                    const actionClass = msg.action === 'BUY' ? 'text-green-400' : msg.action === 'SELL' ? 'text-red-400' : 'text-yellow-400';

                    if (entry.signature) signedCount++;

                    row.innerHTML = `
                        <td class="px-6 py-4 text-xs font-mono text-gray-400">${date}</td>
                        <td class="px-6 py-4 font-bold ${actionClass}">${msg.action}</td>
                        <td class="px-6 py-4 font-mono">${msg.pair}</td>
                        <td class="px-6 py-4">${amount}</td>
                        <td class="px-6 py-4 font-mono">${confidence}</td>
                        <td class="px-6 py-4">
                            <span class="flex items-center gap-1 text-cyan text-xs">
                                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M2.166 4.999A11.954 11.954 0 0010 1.944 11.954 11.954 0 0017.834 5c.11.65.166 1.32.166 2.001 0 5.225-3.34 9.67-8 11.317C5.34 16.67 2 12.225 2 7c0-.682.057-1.35.166-2.001zm11.541 3.708a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>
                                SIGNED
                            </span>
                        </td>
                        <td class="px-6 py-4 text-sm text-gray-300 max-w-xs truncate" title="${entry.reasoning}">
                            ${entry.reasoning}
                        </td>
                    `;
                    logBody.appendChild(row);
                });

                document.getElementById('stat-total').textContent = lines.length;
                document.getElementById('stat-signed').textContent = signedCount;

            } catch (error) {
                console.error('Failed to fetch logs:', error);
            }
        }

        document.getElementById('sync-btn').addEventListener('click', fetchLogs);

        // Auto-poll every 5 seconds
        setInterval(fetchLogs, 5000);

        // Initial load
        fetchLogs();
    </script>
</body>
</html>

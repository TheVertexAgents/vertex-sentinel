name: Continuous Deployment

on:
  push:
    branches: [ "main" ]
  release:
    types: [published]

jobs:
  deploy-sepolia:
    name: Deploy to Sepolia
    runs-on: ubuntu-latest
    environment: 
      name: sepolia
      url: https://sepolia.etherscan.io/
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm ci

      - name: Compile Contracts
        run: npm run compile

      - name: Verify Environment Validations
        # A mock step that would validate the env via your Zod configuration before executing a spend
        run: echo "Pre-flight checks passed."

      - name: Execute Sepolia Deployment script
        env:
          AGENT_PRIVATE_KEY: ${{ secrets.AGENT_PRIVATE_KEY }}
          INFURA_KEY: ${{ secrets.INFURA_KEY }}
          STRYKR_PRISM_API: "mock_prism_key"
          NETWORK: "sepolia"
          GOOGLE_GENAI_API_KEY: "mock_google_key"
          KRAKEN_API_KEY: "mock_kraken_key"
          KRAKEN_SECRET: "mock_kraken_secret"
          RPC_URL: ${{ secrets.SEPOLIA_RPC_URL }}
          NODE_OPTIONS: "--loader ts-node/esm --no-warnings"
        run: npx hardhat run scripts/deploy_sepolia.ts --network sepolia

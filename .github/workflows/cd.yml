name: Continuous Deployment

on:
  push:
    branches: [ "main" ]
  release:
    types: [published]

jobs:
  deploy-sepolia:
    name: Deploy to Sepolia
    runs-on: ubuntu-latest
    environment: 
      name: sepolia
      url: https://sepolia.etherscan.io/
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm ci

      - name: Compile Contracts
        run: npm run compile

      - name: Verify Environment Validations
        # A mock step that would validate the env via your Zod configuration before executing a spend
        run: echo "Pre-flight checks passed."

      - name: Execute Sepolia Deployment script
        env:
          PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          RPC_URL: ${{ secrets.SEPOLIA_RPC_URL }}
        run: npx hardhat run scripts/deploy_sepolia.ts --network sepolia

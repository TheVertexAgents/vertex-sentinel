name: Secret Detection

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  secret-detection:
    name: Scan for Leaked Secrets
    runs-on: ubuntu-latest
    continue-on-error: true
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install ggshield
        run: |
          pip install --upgrade ggshield

      - name: Run ggshield secret scan
        run: |
          if [ -z "$GITGUARDIAN_API_KEY" ]; then
            echo "Warning: GITGUARDIAN_API_KEY not found. Skipping secret scan."
          else
            ggshield secret scan repo . --show-secrets
          fi
        env:
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}

  pre-commit-check:
    name: Pre-commit Hook Verification
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Git hooks
        run: |
          bash scripts/setup-hooks.sh

      - name: Verify pre-commit hook exists
        run: |
          if [ ! -f .git/hooks/pre-commit ]; then
            echo "Pre-commit hook not found!"
            false
          else
            echo "Pre-commit hook exists"
          fi

      - name: Verify hook is executable
        run: |
          if [ ! -x .git/hooks/pre-commit ]; then
            echo "Pre-commit hook is not executable!"
            false
          else
            echo "Pre-commit hook is executable"
          fi

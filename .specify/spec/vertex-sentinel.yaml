name: vertex-sentinel-protocol
description: Verifiable trade execution and risk management layer

entities:
  - TradeIntent:
      agentId: int
      agentWallet: string
      pair: string
      action: string
      amountUsdScaled: int
      maxSlippageBps: int
      nonce: int
      deadline: int
  - Authorization:
      isAllowed: boolean
      reason: string
      signature: string
  - ValidationArtifact:
      intentHash: bytes32
      timestamp: int
      status: enum [AUTHORIZED, REJECTED]

behaviors:
  # This behavior defines the "Handshake"
  submit_intent:
    inputs: [TradeIntent]
    outputs: [ValidationArtifact]
    constraints:
      - rule: "Price must be below maxPrice"
      - rule: "Agent must have active ERC-8004 Registry ID"
      - rule: "Slippage must be < 0.5%"
    effects:
      - emit: "TradeAuthorized"
      - update_reputation: "Success +1, Fail -5"

# The Spec Kit uses this to validate your code implementation
implementations:
  typescript: "src/logic/agent_brain.ts"
  solidity: "src/contracts/RiskRouter.sol"
